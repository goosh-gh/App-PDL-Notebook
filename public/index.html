<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDL Notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
  :root{
    --paper:#f7f5f0; --ink:#211f1b; --muted:#6f6a60; --line:#e2ddd2;
    --rust:#b5532f; --rust-soft:#f0e2da; --ok:#3f7d4f; --err:#a8322a;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --sans:"IBM Plex Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px}
  header{
    position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;
    padding:12px 22px;background:rgba(247,245,240,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  header h1{font-size:15px;font-weight:600;letter-spacing:.02em;margin:0}
  header h1 .dot{color:var(--rust)}
  .pill{font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:999px;
    border:1px solid var(--line);color:var(--muted);background:#fff}
  .pill.ready{color:var(--ok);border-color:#cfe2d3}
  .spacer{flex:1}
  button.bar{font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:6px 13px;border-radius:7px}
  button.bar:hover{border-color:var(--rust);color:var(--rust)}
  main{max-width:880px;margin:26px auto 120px;padding:0 22px}
  .note{font-size:12.5px;color:var(--muted);margin:0 0 18px;font-family:var(--mono)}

  .cell{display:flex;gap:12px;margin:0 0 18px;align-items:flex-start}
  .cell.drag-over{outline:2px dashed var(--rust);outline-offset:2px;border-radius:8px}
  .cell-ctrl{flex:0 0 auto;display:flex;flex-direction:column;gap:4px;align-items:center;margin-top:6px}
  .run{width:30px;height:30px;border-radius:7px;
    border:1px solid var(--line);background:#fff;color:var(--rust);cursor:pointer;
    font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
  .run:hover{background:var(--rust-soft)}
  .run[disabled]{color:var(--muted);cursor:default;background:#fff}
  .cmdbtn{width:30px;height:22px;border-radius:5px;border:1px solid var(--line);
    background:#fff;color:var(--muted);cursor:pointer;font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0}
  .cmdbtn:hover{border-color:var(--rust);color:var(--rust)}
  .delbtn:hover{border-color:#c0392b;color:#c0392b;background:#fbeeec}
  .body{flex:1;min-width:0}
  .editor{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .CodeMirror{height:auto;font-family:var(--mono);font-size:13.5px;line-height:1.55;
    background:#fff;color:var(--ink)}
  .CodeMirror-gutters{background:#fbfaf7;border-right:1px solid var(--line)}
  .CodeMirror-linenumber{color:#bdb6a8}
  .CodeMirror-cursor{border-left:1.5px solid var(--rust)}

  .out{margin-top:7px;display:flex;flex-direction:column;gap:7px}
  .out:empty{margin:0}
  .out pre{margin:0;font-family:var(--mono);font-size:13px;line-height:1.5;
    white-space:pre-wrap;word-break:break-word;padding:9px 12px;border-radius:7px;
    border:1px solid var(--line);background:#fff;overflow-x:auto}
  .out pre.stderr{color:#7a5a14;background:#fdf7e8;border-color:#efe2bf}
  .out pre.error{color:var(--err);background:#fbeeec;border-color:#f0cfca}
  .out pre.result{border-style:dashed;color:var(--muted)}
  .widgets{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;padding:8px 10px;
    background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;align-items:center}
  .widgets label{display:flex;flex-direction:column;gap:3px;font-size:12px;
    color:#444;min-width:120px}
  .widgets input[type=range]{width:180px}
  .widgets input[type=checkbox]{width:18px;height:18px}
  .widgets select{font-size:12px;padding:2px 4px}
  .widgets button.wbtn{font-size:12px;padding:3px 10px;border-radius:4px;
    border:1px solid #888;background:#fff;cursor:pointer}
  .out .fig{padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .out .fig img,.out .fig svg{max-width:100%;height:auto;display:block}
</style>
</head>
<body>
<header>
  <h1>PDL<span class="dot">·</span>Notebook</h1>
  <span class="pill" id="status">connecting…</span>
  <span class="spacer"></span>
  <button class="bar" id="interrupt">Interrupt</button>
  <button class="bar" id="savebtn">💾 Save</button>
  <button class="bar" id="loadbtn">📂 Load</button>
  <input type="file" id="loadfile" accept=".pdlnb,.json" style="display:none">
  <button class="bar" id="addcell">+ Cell</button>
</header>
<main>
  <p class="note" id="lexnote"></p>
  <div id="cells"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/perl/perl.min.js"></script>
<script>
const cellsEl = document.getElementById('cells');
const statusEl = document.getElementById('status');
const lexnote  = document.getElementById('lexnote');

let runSeq = 0;                 // monotonic id per execution
const active  = new Map();       // runId -> {outEl, runBtn}
const cellOut = new Map();       // runId -> outEl  (persistent, survives idle)
let ws, kernelReady = false;
let _lastCellId = 0;            // most-recently run cell, for _key routing

function connect(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen    = () => { statusEl.textContent = 'kernel: connected'; };
  ws.onclose   = () => { statusEl.textContent = 'kernel: disconnected'; statusEl.className='pill'; };
  ws.onmessage = (e) => handle(JSON.parse(e.data));
}

function handle(m){
  if (m.type === 'status' && m.state === 'ready'){
    kernelReady = true;
    statusEl.textContent = 'kernel: ready';
    statusEl.className = 'pill ready';
    if (m.lexical_persistence === false)
      lexnote.textContent = '⚠ Lexical::Persistence not found — `my` variables will not persist across cells (install it, or use `our`/package vars).';
    return;
  }
  const run = active.get(m.id);
  // event-driven redraws arrive after idle: fall back to cellOut
  const out = run ? run.outEl : cellOut.get(m.id);
  if (!out) return;                         // bootstrap (id 0) etc.

  if (m.type === 'stdout')      appendStream(out, 'stdout', m.text);
  else if (m.type === 'stderr') appendStream(out, 'stderr', m.text);
  else if (m.type === 'error')  out.appendChild(pre('error', m.text));
//   else if (m.type === 'result') out.appendChild(pre('result', m.data));
  else if (m.type === 'result'){
    if (m.mime === 'image/svg+xml' || m.mime === 'image/png' || m.mime === 'text/html')
      renderDisplay(out, m);                 // 図は result でも絵として描く
    else
      out.appendChild(pre('result', m.data)); // それ以外は従来どおりテキスト
  }
  else if (m.type === 'display') renderDisplay(out, m);
  else if (m.type === 'widgets') renderWidgets(out, m.id, m.specs);
  else if (m.type === 'status' && m.state === 'idle'){
    if (run) {
      run.runBtn.disabled = false;
      run.runBtn.textContent = '▶';
      active.delete(m.id);
      // cellOut は残す — event-driven redraws がここに描く
    }
  }
}

function pre(cls, text){
  const p = document.createElement('pre');
  if (cls) p.className = cls;
  p.textContent = text;
  return p;
}

function appendStream(out, cls, text){      // keep contiguous stdout in one block
  let last = out.lastElementChild;
  if (last && last.tagName === 'PRE' && last.classList.contains('_'+cls)){
    last.textContent += text;
  } else {
    const p = pre(cls === 'stderr' ? 'stderr' : '', text);
    p.classList.add('_'+cls);
    out.appendChild(p);
  }
}

function renderDisplay(out, m){
  // event-driven redraws: 既存の図を消して置き換える
  if (!active.has(m.id)) {
    const prev = out.querySelector('.fig-display');
    if (prev) prev.remove();
  }
  const fig = document.createElement('div');
  fig.className = 'fig fig-display';
  if (m.mime === 'image/png'){
    const img = document.createElement('img');
    img.src = 'data:image/png;base64,' + m.data;
    fig.appendChild(img);

  } else if (m.mime === 'image/svg+xml'){
    // strip the XML prolog / doctype so the browser parses the <svg> as markup
    const svg = m.data.replace(/^\s*<\?xml[^>]*\?>\s*/i, '')
                      .replace(/^\s*<!DOCTYPE[^>]*>\s*/i, '');
    fig.innerHTML = svg;
  } else if (m.mime === 'text/html'){
    fig.innerHTML = m.data;
  } else {
    fig.appendChild(pre('', m.data));
  }
  out.appendChild(fig);
}


// --- Reactive widgets -------------------------------------------------------
// debounce timers: control name -> timer id
const _wDebounce = {};

function sendEvent(name, value, id) {
  if (ws && ws.readyState === 1)
    ws.send(JSON.stringify({ type: 'event', control: name, value, id: id ?? 0 }));
}

function renderWidgets(out, cellId, specs) {
  // 同セルの既存 .widgets を置き換え
  const prev = out.querySelector('.widgets');
  if (prev) prev.remove();
  if (!specs || specs.length === 0) return;

  const box = document.createElement('div');
  box.className = 'widgets';

  for (const s of specs) {
    const lbl = document.createElement('label');
    const caption = document.createElement('span');
    caption.textContent = s.label ?? s.name;

    if (s.type === 'number') {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:6px';
      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min   = s.min   ?? 0;
      slider.max   = s.max   ?? 1;
      slider.step  = s.step  ?? 0.01;
      slider.value = s.value ?? 0;
      const valSpan = document.createElement('span');
      valSpan.style.cssText = 'font-size:11px;min-width:38px;text-align:right;color:#333';
      valSpan.textContent = Number(s.value).toFixed(
        String(s.step ?? 0.01).includes('.') ?
          String(s.step ?? 0.01).split('.')[1].length : 0
      );
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        valSpan.textContent = v.toFixed(
          String(s.step ?? 0.01).includes('.') ?
            String(s.step ?? 0.01).split('.')[1].length : 0
        );
        // debounce 80ms — continuous drags are coalesced
        clearTimeout(_wDebounce[s.name]);
        _wDebounce[s.name] = setTimeout(() => sendEvent(s.name, v, cellId), 80);
      });
      row.appendChild(slider);
      row.appendChild(valSpan);
      lbl.appendChild(caption);
      lbl.appendChild(row);

    } else if (s.type === 'bool') {
      const cb = document.createElement('input');
      cb.type    = 'checkbox';
      cb.checked = !!s.value;
      cb.addEventListener('change', () => sendEvent(s.name, cb.checked ? 1 : 0, cellId));
      lbl.appendChild(caption);
      lbl.appendChild(cb);

    } else if (s.type === 'enum') {
      const sel = document.createElement('select');
      for (const opt of (s.options ?? [])) {
        const o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        if (opt === s.value) o.selected = true;
        sel.appendChild(o);
      }
      sel.addEventListener('change', () => sendEvent(s.name, sel.value, cellId));
      lbl.appendChild(caption);
      lbl.appendChild(sel);

    } else if (s.type === 'button') {
      const btn = document.createElement('button');
      btn.className = 'wbtn';
      btn.textContent = s.label ?? s.name;
      btn.addEventListener('click', () => sendEvent(s.name, 1, cellId));
      lbl.appendChild(btn);

    } else if (s.type === 'text') {
      // テキストボックス: Enter または focusout で送信
      const inp = document.createElement('input');
      inp.type        = 'text';
      inp.value       = s.value ?? '';
      inp.placeholder = s.placeholder ?? '';
      inp.style.cssText = 'font-size:12px;padding:3px 6px;border:1px solid #ccc;border-radius:4px;width:220px;font-family:var(--mono)';
      const fire = () => sendEvent(s.name, inp.value, cellId);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); fire(); } });
      inp.addEventListener('blur', fire);
      lbl.appendChild(caption);
      lbl.appendChild(inp);

    } else {
      lbl.textContent = `[unknown widget type: ${s.type}]`;
    }

    box.appendChild(lbl);
  }
  out.appendChild(box);
}

// ---------------------------------------------------------------------------
// Cell management
// ---------------------------------------------------------------------------
let cellSeq = 0;  // monotonic DOM-level cell id (separate from runSeq)

function runCell(cm, runBtn, outEl, cellId){
  if (!kernelReady || ws.readyState !== 1) return;
  outEl.innerHTML = '';
  const id = ++runSeq;
  _lastCellId = cellId ?? id;   // _key events target this cell
  active.set(id, { outEl, runBtn });
  cellOut.set(id, outEl);   // event-driven redraws 用に永続保持
  runBtn.disabled = true;
  runBtn.textContent = '…';
  ws.send(JSON.stringify({ type:'run', id, code: cm.getValue() }));
}

function getCells(){
  return Array.from(cellsEl.querySelectorAll('.cell'));
}

function moveCell(cell, dir){
  const cells = getCells();
  const idx = cells.indexOf(cell);
  if (dir === -1 && idx === 0) return;
  if (dir === +1 && idx === cells.length - 1) return;
  const ref = dir === -1 ? cells[idx - 1] : cells[idx + 2];
  cellsEl.insertBefore(cell, ref || null);
}

function deleteCell(cell){
  // セルが1つしかない場合は削除させない
  if (getCells().length <= 1) return;
  if (!confirm('このセルを削除しますか？')) return;
  cell.remove();
}

function addCell(code='', insertBefore=null){
  const cellId = ++cellSeq;

  const cell   = document.createElement('div'); cell.className = 'cell';
  cell.dataset.cellId = cellId;

  // --- 左カラム: ▶ + ↑ ↓ × ------------------------------------------------
  const ctrl   = document.createElement('div'); ctrl.className = 'cell-ctrl';

  const runBtn = document.createElement('button'); runBtn.className='run'; runBtn.textContent='▶';
  runBtn.title = 'Run (Shift-Enter)';

  const upBtn  = document.createElement('button'); upBtn.className='cmdbtn'; upBtn.textContent='↑';
  upBtn.title  = 'Move up';
  const dnBtn  = document.createElement('button'); dnBtn.className='cmdbtn'; dnBtn.textContent='↓';
  dnBtn.title  = 'Move down';
  const delBtn = document.createElement('button'); delBtn.className='cmdbtn delbtn'; delBtn.textContent='×';
  delBtn.title = 'Delete cell';

  ctrl.appendChild(runBtn);
  ctrl.appendChild(upBtn);
  ctrl.appendChild(dnBtn);
  ctrl.appendChild(delBtn);

  // --- 右カラム: editor + output -------------------------------------------
  const body   = document.createElement('div'); body.className='body';
  const edWrap = document.createElement('div'); edWrap.className='editor';
  const ta     = document.createElement('textarea'); ta.value = code;
  const outEl  = document.createElement('div'); outEl.className='out';

  edWrap.appendChild(ta);
  body.appendChild(edWrap);
  body.appendChild(outEl);

  cell.appendChild(ctrl);
  cell.appendChild(body);

  if (insertBefore) {
    cellsEl.insertBefore(cell, insertBefore);
  } else {
    cellsEl.appendChild(cell);
  }

  const cm = CodeMirror.fromTextArea(ta, {
    mode:'perl', lineNumbers:true, indentUnit:4, tabSize:4,
    viewportMargin: Infinity,
    extraKeys:{ 'Shift-Enter': () => runCell(cm, runBtn, outEl, cellId) }
  });

  runBtn.addEventListener('click', () => runCell(cm, runBtn, outEl, cellId));
  upBtn.addEventListener('click',  () => moveCell(cell, -1));
  dnBtn.addEventListener('click',  () => moveCell(cell, +1));
  delBtn.addEventListener('click', () => deleteCell(cell));

  cm.focus();
  return { cell, cm };
}

// ---------------------------------------------------------------------------
// Save / Load  (方針A — 独自 JSON、拡張子 .pdlnb)
// ---------------------------------------------------------------------------
const NOTEBOOK_VERSION = 1;

function gatherNotebook(){
  const cells = getCells().map(cell => {
    const cm = cell._cm;   // attached below
    return { code: cm ? cm.getValue() : '' };
  });
  return { version: NOTEBOOK_VERSION, cells };
}

// addCell 後に cm を cell に紐付ける（gatherNotebook から参照）
// ※ addCell() の return 値を受け取るラッパー
function addCellTracked(code='', insertBefore=null){
  const { cell, cm } = addCell(code, insertBefore);
  cell._cm = cm;    // DOM node に直接格納（GC対象にならない）
  return { cell, cm };
}

document.getElementById('savebtn').addEventListener('click', async () => {
  const nb   = gatherNotebook();
  const json = JSON.stringify(nb, null, 2);
  const blob = new Blob([json], { type: 'application/json' });

  // showSaveFilePicker が使えるブラウザ（Chrome/Edge）ではファイル選択ダイアログを出す
  if (window.showSaveFilePicker) {
    try {
      const fh = await window.showSaveFilePicker({
        suggestedName: 'notebook.pdlnb',
        types: [{ description: 'PDL Notebook', accept: { 'application/json': ['.pdlnb', '.json'] } }],
      });
      const writable = await fh.createWritable();
      await writable.write(blob);
      await writable.close();
    } catch (err) {
      if (err.name !== 'AbortError') console.error('Save failed:', err);
    }
  } else {
    // フォールバック: <a download> で ~/Downloads に保存（Safari / Firefox）
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = 'notebook.pdlnb'; a.click();
    URL.revokeObjectURL(url);
  }
});

document.getElementById('loadbtn').addEventListener('click', () => {
  document.getElementById('loadfile').click();
});

document.getElementById('loadfile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    let nb;
    try { nb = JSON.parse(ev.target.result); }
    catch(err) { alert('ファイルのパースに失敗しました: ' + err.message); return; }
    if (!nb.cells || !Array.isArray(nb.cells)) { alert('不正なノートブック形式です'); return; }
    // 既存セルをすべて削除
    cellsEl.innerHTML = '';
    nb.cells.forEach(c => addCellTracked(c.code ?? ''));
    if (nb.cells.length === 0) addCellTracked('');
  };
  reader.readAsText(file);
  // 同じファイルを再度選べるようリセット
  e.target.value = '';
});

// ---------------------------------------------------------------------------
// Header buttons
// ---------------------------------------------------------------------------
document.getElementById('addcell').addEventListener('click', () => addCellTracked());
document.getElementById('interrupt').addEventListener('click', () => {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type:'interrupt' }));
});

// ---------------------------------------------------------------------------
// Keyboard shortcuts: ArrowLeft/Right → '_key' event to the most-recently
// run cell.  The kernel's on_change('_key') handler advances/retreats pages.
// Only fires when focus is NOT inside a text input (so typing in a widget
// or the CodeMirror editor is never intercepted).
// ---------------------------------------------------------------------------

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;   // don't steal widget/CM focus
  if (e.key === 'ArrowLeft')  { e.preventDefault(); sendEvent('_key', 'prev', _lastCellId); }
  if (e.key === 'ArrowRight') { e.preventDefault(); sendEvent('_key', 'next', _lastCellId); }
});

connect();
addCellTracked('# Shift-Enter to run.  The last expression is shown as the result.\nmy $x = sequence(5);\n$x ** 2;');
</script>
</body>
</html>
